name: Build

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            os: windows-latest
            args: --features canon
          - target: macos-arm64
            os: macos-latest
            args: --target aarch64-apple-darwin --features canon
          - target: macos-x64
            os: macos-latest
            args: --target x86_64-apple-darwin --features canon
          - target: linux-x64
            os: ubuntu-22.04
            args: --features canon
          - target: linux-arm64
            os: ubuntu-22.04-arm
            args: --features canon

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download Canon EDSDK
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            windows-x64)
              mkdir -p .proprietary/canon/windows/Library .proprietary/canon/windows/Dll
              gcloud storage cp gs://cameras-ci-sdk/canon/windows/Library/EDSDK.lib .proprietary/canon/windows/Library/
              gcloud storage cp gs://cameras-ci-sdk/canon/windows/Dll/EDSDK.dll .proprietary/canon/windows/Dll/
              gcloud storage cp gs://cameras-ci-sdk/canon/windows/Dll/EdsImage.dll .proprietary/canon/windows/Dll/
              ;;
            linux-x64)
              mkdir -p .proprietary/canon/linux-x64
              gcloud storage cp gs://cameras-ci-sdk/canon/linux-x64/libEDSDK.so .proprietary/canon/linux-x64/
              ;;
            linux-arm64)
              mkdir -p .proprietary/canon/linux-arm64
              gcloud storage cp gs://cameras-ci-sdk/canon/linux-arm64/libEDSDK.so .proprietary/canon/linux-arm64/
              ;;
            macos-arm64|macos-x64)
              mkdir -p .proprietary/canon/macos
              gcloud storage cp -r gs://cameras-ci-sdk/canon/macos/EDSDK.framework .proprietary/canon/macos/
              ;;
          esac

          # Ensure all SDK directories exist so Tauri resource globs resolve on every platform
          mkdir -p .proprietary/canon/windows/Dll
          mkdir -p .proprietary/canon/linux-x64
          mkdir -p .proprietary/canon/linux-arm64

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Rust target (macOS x64)
        if: matrix.target == 'macos-x64'
        run: rustup target add x86_64-apple-darwin

      - name: Install package manager (from package.json)
        if: runner.os != 'Windows'
        run: |
          corepack enable
          corepack install

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: ${{ runner.os != 'Windows' && 'yarn' || '' }}

      - name: Install package manager (Windows)
        if: runner.os == 'Windows'
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: yarn install --frozen-lockfile --immutable

      - name: Build and upload (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          args: ${{ matrix.args }}

      - name: Build (CI)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
          if-no-files-found: error
