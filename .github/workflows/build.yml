name: Build

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            os: windows-latest
            args: ''
          - target: macos-arm64
            os: macos-latest
            args: --target aarch64-apple-darwin
          - target: macos-x64
            os: macos-latest
            args: --target x86_64-apple-darwin
          - target: linux-x64
            os: ubuntu-22.04
            args: ''
          - target: linux-arm64
            os: ubuntu-22.04-arm
            args: ''

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        if: matrix.target == 'windows-x64'
        id: gcp-auth
        uses: google-github-actions/auth@v2
        continue-on-error: true
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Download Canon EDSDK
        id: canon-sdk
        if: matrix.target == 'windows-x64' && steps.gcp-auth.outcome == 'success'
        shell: pwsh
        run: |
          # Create directory structure
          $sdkBase = ".proprietary/Canon/EDSDKv132010W/EDSDKv132010W/Windows/EDSDK_64"
          New-Item -ItemType Directory -Force -Path "$sdkBase/Library"
          New-Item -ItemType Directory -Force -Path "$sdkBase/Dll"

          # Download SDK files from GCS
          gcloud storage cp gs://cameras-ci-sdk/canon-edsdk/Library/EDSDK.lib "$sdkBase/Library/"
          gcloud storage cp gs://cameras-ci-sdk/canon-edsdk/Dll/EDSDK.dll "$sdkBase/Dll/"
          gcloud storage cp gs://cameras-ci-sdk/canon-edsdk/Dll/EdsImage.dll "$sdkBase/Dll/"

          echo "available=true" >> $env:GITHUB_OUTPUT

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Rust target (macOS x64)
        if: matrix.target == 'macos-x64'
        run: rustup target add x86_64-apple-darwin

      - name: Install package manager (from package.json)
        if: runner.os != 'Windows'
        run: |
          corepack enable
          corepack install

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: ${{ runner.os != 'Windows' && 'yarn' || '' }}

      - name: Install package manager (Windows)
        if: runner.os == 'Windows'
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: yarn install --frozen-lockfile --immutable

      - name: Build and upload (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          args: ${{ matrix.args }}${{ steps.canon-sdk.outputs.available == 'true' && ' --features canon' || '' }}

      - name: Build (CI)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}${{ steps.canon-sdk.outputs.available == 'true' && ' --features canon' || '' }}

      - name: Upload artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
          if-no-files-found: error
